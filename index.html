<!DOCTYPE html>
<html lang="id" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Kendala Harian POSe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.bootstrap5.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay d-none">
    <div class="text-center">
      <div class="spinner-border text-light" role="status"></div>
      <p class="mt-3 mb-0 text-white fw-semibold">Memuat Data Dashboard...</p>
    </div>
  </div>

  <header class="top-nav-bar">
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-sm text-secondary border d-lg-none" id="sidebarToggle"><i class="bi bi-list"></i></button>
      <span class="badge bg-primary text-white">HD</span>
      <span class="nav-breadcrumbs text-muted small">Dashboards Monitoring Kendala</span>
    </div>
    <div class="topbar-right-actions">
      <span class="text-muted small d-none d-md-inline" id="recordCountLabel">0 records found</span>
      <button class="btn btn-link btn-sm text-decoration-none text-dark" id="themeToggle"><i class="bi bi-moon-stars"></i></button>
      <button class="btn btn-link btn-sm text-decoration-none text-dark"><i class="bi bi-fullscreen"></i> Full screen</button>
      <button class="btn btn-link btn-sm text-decoration-none text-dark"><i class="bi bi-share"></i> Share</button>
      <button class="btn btn-link btn-sm text-decoration-none text-danger" id="resetFilters">Reset</button>
    </div>
  </header>

  <section class="filter-search-bar">
    <div class="input-group input-group-sm mb-2">
      <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
      <input type="text" class="form-control border-start-0" id="merchantSearch" placeholder="Filter your data using Merchant Name or Keyword syntax...">
      <span class="input-group-text bg-white text-muted" id="lastUpdateFull" style="font-size: 0.75rem;">-</span>
      
      <select class="form-select bg-light text-dark border-secondary" id="autoRefreshInterval" style="max-width: 140px; font-size: 0.75rem;">
        <option value="0">Auto Refresh: Off</option>
        <option value="60000">Refresh: 1 Menit</option>
        <option value="120000">Refresh: 2 Menit</option>
        <option value="300000" selected>Refresh: 5 Menit</option>
        <option value="600000">Refresh: 10 Menit</option>
      </select>
      
      <button class="btn btn-outline-secondary btn-sm px-3" id="refreshButton" type="button"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
    
    <div class="row g-2">
      <div class="col-6 col-sm-3 col-md-2">
        <div class="filter-dropdown-box">
          <label class="small text-muted">Tanggal Mulai</label>
          <input type="date" class="form-control form-control-sm" id="startDate">
        </div>
      </div>
      <div class="col-6 col-sm-3 col-md-2">
        <div class="filter-dropdown-box">
          <label class="small text-muted">Tanggal Akhir</label>
          <input type="date" class="form-control form-control-sm" id="endDate">
        </div>
      </div>
      <div class="col-6 col-sm-3 col-md-2">
        <div class="filter-dropdown-box">
          <label class="small text-muted">Leader</label>
          <select class="form-select" id="leaderFilter">
            <option value="">Any</option>
          </select>
        </div>
      </div>
      <div class="col-6 col-sm-3 col-md-2">
        <div class="filter-dropdown-box">
          <label class="small text-muted">Status tiket</label>
          <select class="form-select" id="statusFilter">
            <option value="">Any</option>
            <option value="Pending">Pending</option>
            <option value="On Progress">On Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="filter-dropdown-box">
          <label class="small text-muted">Proses Filter</label>
          <select class="form-select" id="processFilter">
            <option value="">Any (SM / CM / FU)</option>
            <option value="SM">SM Only</option>
            <option value="CM">CM Only</option>
            <option value="FU">FU Only</option>
          </select>
        </div>
      </div>
    </div>
  </section>

  <main class="dashboard-viewport">
    <div id="errorAlert" class="alert alert-danger d-none mb-3" role="alert"></div>

    <div class="it-dashboard-banner">
      Dashboard Kendala (WA)
    </div>

    <div class="row g-3 mb-4" id="kpiSection">
      <div class="col-6 col-lg-3">
        <div class="pose-kpi-card bg-pastel-gray">
          <div class="kpi-title">Total Kendala</div>
          <div class="kpi-value" id="kpiAllTotal">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="pose-kpi-card bg-pastel-blue">
          <div class="kpi-title">On Progress</div>
          <div class="kpi-value" id="kpiAllProgress">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="pose-kpi-card bg-pastel-yellow">
          <div class="kpi-title">Pending</div>
          <div class="kpi-value" id="kpiAllPending">0</div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="pose-kpi-card bg-pastel-green">
          <div class="kpi-title">Done Total</div>
          <div class="kpi-value" id="kpiAllDone">0</div>
        </div>
      </div>
    </div>

    <div class="row g-2 mb-4 text-center">
      <div class="col-4"><div class="p-2 border rounded bg-light small text-muted">Total SM: <strong class="text-dark" id="kpiSM">0</strong></div></div>
      <div class="col-4"><div class="p-2 border rounded bg-light small text-muted">Total CM: <strong class="text-dark" id="kpiCM">0</strong></div></div>
      <div class="col-4"><div class="p-2 border rounded bg-light small text-muted">Total FU: <strong class="text-dark" id="kpiFU">0</strong></div></div>
    </div>

    <div class="it-dashboard-sub-banner">
      List of Task
    </div>

    <div class="glass-card table-card-container">
      <div class="table-responsive">
        <table id="kendalaTable" class="table table-striped table-hover align-middle w-100">
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>TID</th>
              <th>Nama Merchant</th>
              <th>Leader</th>
              <th>Kendala</th>
              <th>SM</th>
              <th>CM</th>
              <th>FU</th>
              <th>Status tiket</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.bootstrap5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
